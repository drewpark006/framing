<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1f1f23">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Verso">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="apple-touch-icon" href="/assets/icon-180.png">
  <link rel="icon" href="/assets/favicon.png">
  <title>Verso · intake</title>
  <link rel="stylesheet" href="/assets/counter.css">
</head>
<body class="pos-body">
  <header class="pos-header">
    <a href="/counter/" class="pos-logo">Verso<span class="pos-logo-sub">new ticket</span></a>
    <div class="pos-header-actions">
      <button id="scan-btn" type="button" class="btn btn-ghost btn-sm">Scan ticket</button>
      <a href="/counter/" class="btn btn-ghost btn-sm">Cancel</a>
    </div>
  </header>

  <main class="pos-main" id="intake-root">
    <!-- CounterIntake renders the two-pane body here. -->
  </main>

  <footer class="pos-footer" id="intake-footer">
    <div class="pos-footer-summary" id="footer-summary">Total —</div>
    <div class="pos-footer-actions">
      <a href="/counter/" class="btn btn-ghost">Cancel order</a>
      <button id="save-btn" class="btn btn-primary btn-large" disabled>Save ticket</button>
    </div>
  </footer>

  <div id="modal-root"></div>
  <input type="file" id="scan-input" accept="image/*" capture="environment" hidden>

  <script src="/assets/counter.js?v=livesync2s"></script>
  <script>
    CounterIntake.mount();
  </script>
</body>
</html>
