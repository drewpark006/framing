<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1f1f23">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Verso">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="apple-touch-icon" href="/assets/icon-180.png">
  <link rel="icon" href="/assets/favicon.png">
  <title>Verso · orders</title>
  <link rel="stylesheet" href="/assets/counter.css">
</head>
<body class="pos-body">
  <header class="pos-header">
    <a href="/counter/" class="pos-logo">Verso<span class="pos-logo-sub">counter dashboard</span></a>
    <div class="pos-header-actions">
      <span class="sync-indicator" id="sync-indicator"></span>
      <a href="/counter/intake.html" class="btn btn-primary">+ New order</a>
    </div>
  </header>

  <main>
    <h1 class="page-title">Orders</h1>
    <p class="page-sub">Active work, pickups waiting, and recently closed orders.</p>

    <div class="board">
      <section class="board-col">
        <header class="board-col-head">
          <div class="board-col-title">Active</div>
          <div class="board-col-count" id="count-active">0</div>
        </header>
        <div class="board-col-scroll" id="col-active"></div>
      </section>
      <section class="board-col">
        <header class="board-col-head">
          <div class="board-col-title">Ready for pickup</div>
          <div class="board-col-count" id="count-ready">0</div>
        </header>
        <div class="board-col-scroll" id="col-ready"></div>
      </section>
      <section class="board-col">
        <header class="board-col-head">
          <div class="board-col-title">Recently closed</div>
          <div class="board-col-count" id="count-closed">0</div>
        </header>
        <div class="board-col-scroll" id="col-closed"></div>
      </section>
    </div>
  </main>

  <script src="/assets/counter.js?v=livesync"></script>
  <script>
    CounterDashboard.mount();
  </script>
</body>
</html>
